spring.application.name=cardetail
server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cardetail}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.default_schema=system

spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/master.xml
spring.liquibase.default-schema=system
spring.liquibase.liquibase-schema=system
spring.liquibase.parameters.fileEncoding=UTF-8

# JWT — defina JWT_SECRET como variável de ambiente (ou em application-local.properties gitignored)
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=86400000

# Cookie
app.cookie.secure=${APP_COOKIE_SECURE:false}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized